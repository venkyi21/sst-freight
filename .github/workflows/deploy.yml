name: Deploy

# main  -> production, published at the site root
# dev   -> staging,    published at /preview/ on the SAME Pages site
#
# Both branches publish to the gh-pages branch with keep_files: true, so a
# deploy from one branch never wipes out the other's directory.

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  # main only: the unit suite must pass before a build reaches production (ADR-0027).
  # dev/preview deploys are deliberately ungated — iteration speed there is untouched.
  test:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build-and-deploy:
    needs: test
    # Run when the gate passed (main) OR was skipped entirely (dev) — but never when it failed.
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure production environment (main)
        if: github.ref_name == 'main'
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> "$GITHUB_ENV"
          echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          echo "DEPLOY_DEST=" >> "$GITHUB_ENV"

      - name: Configure staging environment (dev)
        if: github.ref_name == 'dev'
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.DEV_SUPABASE_URL }}" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.DEV_SUPABASE_ANON_KEY }}" >> "$GITHUB_ENV"
          echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/preview/" >> "$GITHUB_ENV"
          echo "DEPLOY_DEST=preview" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ env.DEPLOY_DEST }}
          keep_files: true
