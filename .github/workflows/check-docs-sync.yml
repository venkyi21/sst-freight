name: Docs sync check

# Fails a push if supabase/schema.sql changed without a matching update to at least one
# docs-as-code file (docs/adr/**, docs/tech-debt.md, docs/api-reference.md). Same rule as
# the local pre-commit hook (.githooks/pre-commit) — this is the server-side safety net for
# when that hook was bypassed or never set up locally. See scripts/check-docs-sync.js.

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Determine changed files
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          # First push of a new branch (or force-push history rewrite) has no valid "before" —
          # nothing to diff against, so just check the files in the head commit itself.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base" 2>/dev/null; then
            files=$(git diff-tree --no-commit-id --name-only -r "$head")
          else
            files=$(git diff --name-only "$base" "$head")
          fi

          echo "Changed files:"
          echo "$files"
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check docs sync
        # The file list is multi-line, so it must reach the shell as an env var and be
        # word-split there — interpolating ${{ ... }} directly into `run:` pastes each
        # subsequent line as its own shell command, which is why this step failed on every
        # run from the workflow's creation until 2026-07-16 (bash -e treated line 2, e.g.
        # "CLAUDE.md", as a command and exited 127 before the check's verdict mattered).
        env:
          CHANGED_FILES: ${{ steps.diff.outputs.files }}
        run: node scripts/check-docs-sync.js $CHANGED_FILES
